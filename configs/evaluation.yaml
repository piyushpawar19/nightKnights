# Evaluation & Submission Generation Settings

evaluation:
  metrics:
    - "ndcg@10"
    - "ndcg@100"
    - "precision@10"
    - "honeypot_rate"

submission:
  output_csv: "outputs/submissions/team_submission.csv"
  required_columns:
    - "candidate_id"
    - "rank"
    - "score"
    - "reasoning"
  max_rows: 100
